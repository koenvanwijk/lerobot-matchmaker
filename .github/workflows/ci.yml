name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (aiohttp + Firebase)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio aiohttp functions-framework google-cloud-firestore flask

      - name: Run all tests
        run: pytest tests/ -v

  deploy-firebase:
    name: Deploy to Firebase Cloud Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Python (for Cloud Functions)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy Cloud Functions
        env:
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json

          # Set up Python venv required by Firebase CLI
          cd firebase_function
          python3.12 -m venv venv
          source venv/bin/activate
          pip install -q -r requirements.txt
          cd ..

          firebase deploy \
            --only functions \
            --project "$FIREBASE_PROJECT" \
            --non-interactive \
            --force
