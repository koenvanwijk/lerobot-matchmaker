name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (aiohttp + Firebase)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio aiohttp functions-framework google-cloud-firestore flask

      - name: Run all tests
        run: pytest tests/ -v

  deploy-firebase:
    name: Deploy to Firebase Cloud Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Python (for Cloud Functions)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy Cloud Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
        run: |
          firebase deploy \
            --only functions \
            --project "$FIREBASE_PROJECT" \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
